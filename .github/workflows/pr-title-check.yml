name: PR Title Check

on:
  pull_request:
    types: [opened, edited]

jobs:
  check-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          subjectPattern: ^\[SCRUM-\d+\].+$
          subjectPatternError: 'PR 제목은 "[SCRUM-숫자] 설명" 형식이어야 합니다. 예: [SCRUM-1] 예배정보 타이틀화' 